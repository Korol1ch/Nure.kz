<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NURE — Админ Панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #f0efec; color: #1a1a1a; }
a { text-decoration: none; color: inherit; }

.admin-nav { background: #1a1a1a; color: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.admin-nav__logo { font-family: 'Playfair Display', serif; font-size: 16px; letter-spacing: 0.1em; }
.admin-nav__badge { background: #8B6914; color: white; font-size: 8px; font-weight: 600; letter-spacing: 0.14em; padding: 3px 8px; border-radius: 4px; margin-left: 10px; }
.nav-link { font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); cursor: pointer; background: none; border: none; font-family: 'Montserrat', sans-serif; }
.nav-link:hover { color: white; }

.admin-layout { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

.admin-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: white; border-radius: 12px; padding: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.admin-tab { flex: 1; padding: 10px; text-align: center; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; border-radius: 8px; cursor: pointer; background: none; border: none; color: rgba(0,0,0,0.4); font-family: 'Montserrat', sans-serif; transition: all 0.2s; }
.admin-tab.active { background: #1a1a1a; color: white; }

.section-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.section-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; margin-bottom: 6px; }
.section-sub { font-size: 11px; color: rgba(0,0,0,0.4); letter-spacing: 0.04em; margin-bottom: 20px; }

/* PRODUCT LIST */
.product-list { display: flex; flex-direction: column; gap: 0; }
.product-row { display: flex; gap: 14px; align-items: center; padding: 14px 8px; border-bottom: 1px solid rgba(0,0,0,0.06); border-radius: 8px; transition: background 0.15s; }
.product-row:hover { background: rgba(0,0,0,0.02); }
.product-row.inactive { opacity: 0.5; }
.product-row__img { width: 52px; height: 66px; object-fit: cover; border-radius: 6px; background: #ede9e3; flex-shrink: 0; }
.product-row__info { flex: 1; min-width: 0; }
.product-row__name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-row__meta { font-size: 10px; color: rgba(0,0,0,0.4); letter-spacing: 0.06em; }
.product-row__badge-out { display: inline-block; background: #f5e0e0; color: #c0392b; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 4px; margin-left: 6px; }
.product-row__price { font-size: 14px; font-weight: 600; flex-shrink: 0; }
.product-row__actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-edit { background: none; border: 1px solid rgba(0,0,0,0.15); color: rgba(0,0,0,0.5); font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
.btn-edit:hover { border-color: #1a1a1a; color: #1a1a1a; }
.btn-deactivate { background: none; border: 1px solid rgba(180,0,0,0.2); color: #c0392b; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
.btn-deactivate:hover { background: #fff0f0; }
.btn-activate { background: none; border: 1px solid rgba(0,120,0,0.2); color: #27ae60; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
.btn-activate:hover { background: #f0fff4; }

/* CREATE FORM */
.create-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.create-form .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: rgba(0,0,0,0.5); text-transform: uppercase; }
.form-input, .form-select, .form-textarea { font-family: 'Montserrat', sans-serif; font-size: 13px; padding: 10px 14px; border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; background: #fafafa; color: #1a1a1a; outline: none; transition: border 0.2s; width: 100%; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #1a1a1a; background: white; }
.form-textarea { resize: vertical; min-height: 80px; }
.btn-primary { background: #1a1a1a; color: white; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; padding: 13px 28px; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* MODAL */
.modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-wrap.open { display: flex; }
@media (min-width: 600px) { .modal-wrap { align-items: center; } }
.modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 28px; }
@media (min-width: 600px) { .modal { border-radius: 20px; } }
.modal__title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; margin-bottom: 24px; }
.modal__close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: rgba(0,0,0,0.4); margin-top: -4px; }

/* IMAGES GRID */
.images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-bottom: 16px; }
.img-thumb { position: relative; aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-thumb__del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* UPLOAD ZONE */
.upload-zone { border: 2px dashed rgba(0,0,0,0.15); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.upload-zone:hover { border-color: #1a1a1a; }
.upload-zone input { display: none; }
.upload-zone__text { font-size: 11px; color: rgba(0,0,0,0.4); letter-spacing: 0.04em; }

/* COUNTDOWN BADGE */
.countdown { font-size: 9px; color: #c0392b; font-weight: 600; }

/* USERS TABLE */
.users-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.users-table th { text-align: left; font-size: 9px; letter-spacing: 0.1em; color: rgba(0,0,0,0.4); font-weight: 600; padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.08); text-transform: uppercase; }
.users-table td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.04); }

/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: white; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.login-logo { font-family: 'Playfair Display', serif; font-size: 28px; text-align: center; margin-bottom: 32px; letter-spacing: 0.06em; }
.login-err { color: #c0392b; font-size: 11px; text-align: center; margin-top: 12px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 12px; font-size: 12px; letter-spacing: 0.04em; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

.tab-content { display: none; }
.tab-content.active { display: block; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">NURÉ</div>
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="admin@example.com">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">Пароль</label>
      <input class="form-input" type="password" id="loginPass" placeholder="••••••">
    </div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">ВОЙТИ</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN UI -->
<div id="adminUI" style="display:none">
  <nav class="admin-nav">
    <div style="display:flex;align-items:center">
      <span class="admin-nav__logo">NURÉ</span>
      <span class="admin-nav__badge">ADMIN</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <a href="../index.html" class="nav-link">← Сайт</a>
      <button class="nav-link" onclick="API.logout()">Выйти</button>
    </div>
  </nav>

  <div class="admin-layout">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('products')">ТОВАРЫ</button>
      <button class="admin-tab" onclick="switchTab('add')">+ ДОБАВИТЬ</button>
      <button class="admin-tab" onclick="switchTab('users')">КЛИЕНТЫ</button>
    </div>

    <!-- ТОВАРЫ -->
    <div class="tab-content active" id="tab-products">
      <div class="section-card">
        <div class="section-title">Товары</div>
        <div class="section-sub">Нажмите «Изм.» чтобы редактировать товар или загрузить фото</div>
        <div class="product-list" id="productList">
          <div style="text-align:center;padding:40px;color:rgba(0,0,0,0.3);font-size:12px">Загрузка...</div>
        </div>
      </div>
    </div>

    <!-- ДОБАВИТЬ -->
    <div class="tab-content" id="tab-add">
      <div class="section-card">
        <div class="section-title">Новый товар</div>
        <div class="section-sub">Заполните основные данные. Фото можно добавить после создания</div>
        <div class="create-form">
          <div class="form-group full">
            <label class="form-label">Название *</label>
            <input class="form-input" id="newName" placeholder="Платье из шёлка">
          </div>
          <div class="form-group">
            <label class="form-label">Цена (₸)</label>
            <input class="form-input" id="newPrice" type="number" placeholder="45000">
          </div>
          <div class="form-group">
            <label class="form-label">Категория</label>
            <select class="form-select" id="newCategory">
              <option value="">— выбрать —</option>
              <option value="dress">Платья</option>
              <option value="outer">Верхняя одежда</option>
              <option value="suit">Костюмы</option>
              <option value="top">Топы</option>
              <option value="acc">Аксессуары</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Бейдж</label>
            <input class="form-input" id="newBadge" placeholder="NEW / SALE / HIT">
          </div>
          <div class="form-group">
            <label class="form-label">Размеры (через запятую)</label>
            <input class="form-input" id="newSizes" placeholder="XS, S, M, L, XL">
          </div>
          <div class="form-group full">
            <label class="form-label">Описание</label>
            <textarea class="form-textarea" id="newDesc" placeholder="Описание товара..."></textarea>
          </div>
          <div class="form-group full">
            <button class="btn-primary" id="btnCreate" onclick="createProduct()">СОЗДАТЬ ТОВАР</button>
          </div>
        </div>
      </div>
    </div>

    <!-- КЛИЕНТЫ -->
    <div class="tab-content" id="tab-users">
      <div class="section-card">
        <div class="section-title">Клиенты</div>
        <div class="section-sub">Зарегистрированные пользователи</div>
        <table class="users-table">
          <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Дата</th></tr></thead>
          <tbody id="usersBody"><tr><td colspan="4" style="padding:20px;text-align:center;color:rgba(0,0,0,0.3)">Загрузка...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-wrap" id="editModal">
  <div class="modal">
    <button class="modal__close" onclick="closeEdit()">✕</button>
    <div class="modal__title" id="editTitle">Редактировать</div>

    <div class="create-form" style="margin-bottom:20px">
      <div class="form-group full">
        <label class="form-label">Название</label>
        <input class="form-input" id="eName">
      </div>
      <div class="form-group">
        <label class="form-label">Цена (₸)</label>
        <input class="form-input" id="ePrice" type="number">
      </div>
      <div class="form-group">
        <label class="form-label">Категория</label>
        <select class="form-select" id="eCategory">
          <option value="">— выбрать —</option>
          <option value="dress">Платья</option>
          <option value="outer">Верхняя одежда</option>
          <option value="suit">Костюмы</option>
          <option value="top">Топы</option>
          <option value="acc">Аксессуары</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Бейдж</label>
        <input class="form-input" id="eBadge" placeholder="NEW / SALE">
      </div>
      <div class="form-group">
        <label class="form-label">Размеры (через запятую)</label>
        <input class="form-input" id="eSizes">
      </div>
      <div class="form-group full">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="eDesc"></textarea>
      </div>
    </div>
    <button class="btn-primary" style="width:100%;margin-bottom:20px" onclick="saveEdit()">СОХРАНИТЬ</button>

    <div style="border-top:1px solid rgba(0,0,0,0.08);padding-top:20px;margin-bottom:20px">
      <div class="form-label" style="margin-bottom:12px">ФОТОГРАФИИ</div>
      <div class="images-grid" id="editImages"></div>
      <label class="upload-zone">
        <input type="file" multiple accept="image/*" onchange="uploadImages(this)">
        <div class="upload-zone__text">Нажмите чтобы загрузить фото (jpg, png, webp)</div>
      </label>
    </div>

    <div style="border-top:1px solid rgba(0,0,0,0.08);padding-top:20px" id="deactivateSection">
      <div class="form-label" style="margin-bottom:8px">СТАТУС ТОВАРА</div>
      <div id="deactivateInfo" style="font-size:11px;color:rgba(0,0,0,0.5);margin-bottom:12px"></div>
      <button id="btnDeactivate" class="btn-deactivate" onclick="toggleActivation()"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../api-client.js"></script>
<script>
let currentEditId = null;
let allProducts   = [];

// ── AUTH ──
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  try {
    const res = await API.login(email, pass);
    if (!res.token) { err.textContent = res.error || 'Ошибка входа'; return; }
    if (res.user.role !== 'admin') { err.textContent = 'Нет доступа к админ-панели'; API.logout(); return; }
    showAdmin();
  } catch { err.textContent = 'Ошибка соединения'; }
}

function showAdmin() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminUI').style.display = 'block';
  loadProducts();
  loadUsers();
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.admin-tab').forEach((t, i) => {
    t.classList.toggle('active', ['products','add','users'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ── PRODUCTS ──
async function loadProducts() {
  const res = await API.adminGetProducts();
  allProducts = res.products || [];
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('productList');
  if (!allProducts.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(0,0,0,0.3);font-size:12px">Товаров пока нет. Добавьте первый!</div>';
    return;
  }
  list.innerHTML = allProducts.map(p => {
    const img = (p.images && p.images.default && p.images.default[0]) || PLACEHOLDER_IMG;
    const isDeactivated = !!p.deactivatedAt;
    const countdown = isDeactivated ? getDaysLeft(p.deactivatedAt) : null;
    return `
      <div class="product-row ${isDeactivated ? 'inactive' : ''}">
        <img class="product-row__img" src="${img}" onerror="this.src='${PLACEHOLDER_IMG}'">
        <div class="product-row__info">
          <div class="product-row__name">
            ${p.name}
            ${isDeactivated ? `<span class="product-row__badge-out">НЕТ В НАЛИЧИИ</span>` : ''}
          </div>
          <div class="product-row__meta">
            ${p.category || '—'}
            ${isDeactivated ? `<span class="countdown"> · удалится через ${countdown}</span>` : ''}
          </div>
        </div>
        <div class="product-row__price">${p.price ? formatPrice(p.price) + ' ₸' : '—'}</div>
        <div class="product-row__actions">
          <button class="btn-edit" onclick="openEdit('${p.id}')">Изм.</button>
        </div>
      </div>
    `;
  }).join('');
}

function getDaysLeft(deactivatedAt) {
  const ms   = 7 * 24 * 60 * 60 * 1000 - (Date.now() - new Date(deactivatedAt).getTime());
  const days = Math.ceil(ms / (24 * 60 * 60 * 1000));
  if (days <= 0) return 'менее дня';
  return days + ' д.';
}

// ── CREATE ──
async function createProduct() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { showToast('Введите название'); return; }
  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = 'СОЗДАНИЕ...';
  const res = await API.adminCreateProduct({
    name,
    price:       parseFloat(document.getElementById('newPrice').value) || 0,
    category:    document.getElementById('newCategory').value,
    badge:       document.getElementById('newBadge').value.trim(),
    sizes:       document.getElementById('newSizes').value.split(',').map(s => s.trim()).filter(Boolean),
    description: document.getElementById('newDesc').value.trim(),
  });
  btn.disabled = false; btn.textContent = 'СОЗДАТЬ ТОВАР';
  if (res.success) {
    showToast('Товар создан!');
    ['newName','newPrice','newBadge','newSizes','newDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('newCategory').value = '';
    allProducts.unshift(res.product);
    renderProducts();
    switchTab('products');
  } else {
    showToast(res.error || 'Ошибка');
  }
}

// ── EDIT MODAL ──
function openEdit(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  currentEditId = id;

  document.getElementById('editTitle').textContent = p.name;
  document.getElementById('eName').value     = p.name || '';
  document.getElementById('ePrice').value    = p.price || '';
  document.getElementById('eCategory').value = p.category || '';
  document.getElementById('eBadge').value    = p.badge || '';
  document.getElementById('eSizes').value    = (p.sizes || []).join(', ');
  document.getElementById('eDesc').value     = p.description || '';

  // Фото
  renderEditImages(p);

  // Статус
  const isDeactivated = !!p.deactivatedAt;
  const infoEl = document.getElementById('deactivateInfo');
  const btnEl  = document.getElementById('btnDeactivate');
  if (isDeactivated) {
    infoEl.textContent = `Деактивирован ${new Date(p.deactivatedAt).toLocaleDateString('ru')} · удалится через ${getDaysLeft(p.deactivatedAt)}`;
    btnEl.textContent  = 'РЕАКТИВИРОВАТЬ';
    btnEl.className    = 'btn-activate';
  } else {
    infoEl.textContent = 'Товар активен и отображается в каталоге';
    btnEl.textContent  = 'ДЕАКТИВИРОВАТЬ';
    btnEl.className    = 'btn-deactivate';
  }

  document.getElementById('editModal').classList.add('open');
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  currentEditId = null;
}

function renderEditImages(p) {
  const grid = document.getElementById('editImages');
  const imgs = (p.images && p.images.default) || [];
  if (!imgs.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = imgs.map(url => `
    <div class="img-thumb">
      <img src="${url}" onerror="this.src='${PLACEHOLDER_IMG}'">
      <button class="img-thumb__del" onclick="deleteImage('${url}')">✕</button>
    </div>
  `).join('');
}

async function saveEdit() {
  if (!currentEditId) return;
  const res = await API.adminUpdateProduct(currentEditId, {
    name:        document.getElementById('eName').value.trim(),
    price:       parseFloat(document.getElementById('ePrice').value) || 0,
    category:    document.getElementById('eCategory').value,
    badge:       document.getElementById('eBadge').value.trim(),
    sizes:       document.getElementById('eSizes').value.split(',').map(s => s.trim()).filter(Boolean),
    description: document.getElementById('eDesc').value.trim(),
  });
  if (res.success) {
    const idx = allProducts.findIndex(p => p.id === currentEditId);
    if (idx !== -1) allProducts[idx] = { ...allProducts[idx], ...res.product };
    renderProducts();
    showToast('Сохранено');
    closeEdit();
  } else {
    showToast(res.error || 'Ошибка');
  }
}

async function uploadImages(input) {
  if (!currentEditId || !input.files.length) return;
  showToast('Загрузка...');
  const res = await API.adminUploadImages(currentEditId, [...input.files]);
  if (res.success) {
    const idx = allProducts.findIndex(p => p.id === currentEditId);
    if (idx !== -1) {
      if (!allProducts[idx].images) allProducts[idx].images = {};
      if (!allProducts[idx].images.default) allProducts[idx].images.default = [];
      allProducts[idx].images.default.push(...res.urls);
      renderEditImages(allProducts[idx]);
      renderProducts();
    }
    showToast('Фото загружены!');
  } else {
    showToast(res.error || 'Ошибка загрузки');
  }
  input.value = '';
}

async function deleteImage(url) {
  if (!currentEditId) return;
  const res = await API.adminDeleteImage(currentEditId, url);
  if (res.success) {
    const idx = allProducts.findIndex(p => p.id === currentEditId);
    if (idx !== -1 && allProducts[idx].images && allProducts[idx].images.default) {
      allProducts[idx].images.default = allProducts[idx].images.default.filter(u => u !== url);
      renderEditImages(allProducts[idx]);
      renderProducts();
    }
    showToast('Фото удалено');
  }
}

async function toggleActivation() {
  if (!currentEditId) return;
  const p = allProducts.find(x => x.id === currentEditId);
  if (!p) return;
  const isDeactivated = !!p.deactivatedAt;
  const res = isDeactivated
    ? await API.adminActivateProduct(currentEditId)
    : await API.adminDeactivateProduct(currentEditId);
  if (res.success) {
    const idx = allProducts.findIndex(x => x.id === currentEditId);
    if (idx !== -1) allProducts[idx] = { ...allProducts[idx], ...res.product };
    renderProducts();
    closeEdit();
    showToast(isDeactivated ? 'Товар реактивирован' : 'Товар деактивирован — удалится через 7 дней');
  } else {
    showToast(res.error || 'Ошибка');
  }
}

// ── USERS ──
async function loadUsers() {
  const res = await API.adminGetUsers();
  const tbody = document.getElementById('usersBody');
  const users = res.users || [];
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="padding:20px;text-align:center;color:rgba(0,0,0,0.3)">Нет пользователей</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td style="color:${u.role==='admin'?'#8B6914':'inherit'}">${u.role}</td>
      <td>${new Date(u.createdAt).toLocaleDateString('ru')}</td>
    </tr>
  `).join('');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEdit();
});

const user = API.getUser();
if (user && user.role === 'admin' && API.getToken()) {
  showAdmin();
}
</script>
